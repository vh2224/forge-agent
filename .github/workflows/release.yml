name: Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          # If HEAD is already tagged (manual tag push or tag+commit together),
          # use that tag directly — skip semver bump entirely.
          HEAD_TAG=$(git tag --points-at HEAD -l 'v*' | sort -V | tail -1)
          if [ -n "$HEAD_TAG" ]; then
            echo "new_tag=$HEAD_TAG" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "range=${HEAD_TAG}^..HEAD" >> "$GITHUB_OUTPUT"
            echo "HEAD is already tagged: $HEAD_TAG — using as-is"
            exit 0
          fi

          # Triggered by branch push without a tag — calculate next semver.
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LATEST_TAG}..HEAD"
          fi

          COMMITS=$(git log "$RANGE" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No commits since $LATEST_TAG, skipping."
            exit 0
          fi

          BUMP="none"
          while IFS= read -r msg; do
            if echo "$msg" | grep -qiE '^[a-z]+(\(.+\))?!:|BREAKING[ -]CHANGE'; then
              BUMP="major"; break
            fi
          done <<< "$COMMITS"

          if [ "$BUMP" = "none" ]; then
            while IFS= read -r msg; do
              if echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
                BUMP="minor"; break
              fi
            done <<< "$COMMITS"
          fi

          if [ "$BUMP" = "none" ]; then
            while IFS= read -r msg; do
              if echo "$msg" | grep -qE '^fix(\(.+\))?:'; then
                BUMP="patch"
              fi
            done <<< "$COMMITS"
          fi

          if [ "$BUMP" = "none" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No releasable commits (feat/fix/breaking), skipping."
            exit 0
          fi

          if [ -z "$LATEST_TAG" ]; then
            MAJOR=0; MINOR=0; PATCH=0
          else
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "range=$RANGE" >> "$GITHUB_OUTPUT"
          echo "Bump type: $BUMP → $NEW_TAG"

      - name: Generate changelog
        if: steps.version.outputs.skip != 'true'
        id: changelog
        run: |
          RANGE="${{ steps.version.outputs.range }}"
          COMMITS=$(git log "$RANGE" --pretty=format:"%H %s" 2>/dev/null || git log --pretty=format:"%H %s")

          BREAKING=""; FEATURES=""; FIXES=""; OTHER=""

          while IFS= read -r line; do
            HASH=$(echo "$line" | cut -c1-7)
            MSG=$(echo "$line" | cut -d' ' -f2-)
            if echo "$MSG" | grep -qiE '^[a-z]+(\(.+\))?!:|BREAKING[ -]CHANGE'; then
              BREAKING="${BREAKING}- ${MSG} (${HASH})\n"
            elif echo "$MSG" | grep -qE '^feat(\(.+\))?:'; then
              FEATURES="${FEATURES}- ${MSG} (${HASH})\n"
            elif echo "$MSG" | grep -qE '^fix(\(.+\))?:'; then
              FIXES="${FIXES}- ${MSG} (${HASH})\n"
            else
              OTHER="${OTHER}- ${MSG} (${HASH})\n"
            fi
          done <<< "$COMMITS"

          {
            [ -n "$BREAKING" ] && { echo "### Breaking Changes"; echo ""; echo -e "$BREAKING"; }
            [ -n "$FEATURES" ] && { echo "### Features"; echo ""; echo -e "$FEATURES"; }
            [ -n "$FIXES"    ] && { echo "### Bug Fixes"; echo ""; echo -e "$FIXES"; }
            [ -n "$OTHER"    ] && { echo "### Other Changes"; echo ""; echo -e "$OTHER"; }
          } > /tmp/changelog.md

      - name: Create release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          # If tag doesn't exist yet (auto-bump case), gh release create will create it.
          # If tag already exists (manual tag case), --verify-tag ensures we use it as-is.
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            gh release create "$NEW_TAG" \
              --title "$NEW_TAG" \
              --notes-file /tmp/changelog.md \
              --verify-tag
          else
            gh release create "$NEW_TAG" \
              --title "$NEW_TAG" \
              --notes-file /tmp/changelog.md \
              --target master
          fi
